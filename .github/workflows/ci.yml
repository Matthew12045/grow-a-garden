name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install SFML
        run: sudo apt-get install -y libsfml-dev

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build
