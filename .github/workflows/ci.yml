name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install SFML dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsfml-dev \
            xorg-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build
